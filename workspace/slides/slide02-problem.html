<!DOCTYPE html>
<html>
<head>
<style>
html { background: #030712; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif; display: flex; flex-direction: column;
  background-image: url('bg-dark.png'); background-size: cover;
}
.top-accent { position: absolute; top: 0; left: 0; width: 100%; height: 5pt; }
.top-accent img { width: 100%; height: 5pt; }
.bar { position: absolute; left: 44pt; top: 110pt; }
.bar img { width: 5pt; height: 200pt; }
.header { margin: 44pt 0 0 60pt; }
h2 { color: #ef4444; font-size: 13pt; margin: 0 0 4pt 0; font-weight: normal; letter-spacing: 2pt; }
h1 { color: #f9fafb; font-size: 36pt; margin: 0; }
.content { margin: 28pt 60pt 0 60pt; }
ul { list-style: none; padding: 0; margin: 0; }
li { color: #e5e7eb; font-size: 16pt; margin: 0 0 18pt 0; line-height: 1.45; }
</style>
</head>
<body>
<div class="top-accent"><img src="bar-top-cyan.png"></div>
<div class="bar"><img src="bar-cyan.png"></div>
<div class="header">
  <h2>CHALLENGE</h2>
  <h1>The Problem</h1>
</div>
<div class="content">
  <ul>
    <li>Monsoon floods destroy roads and bridges in Bangladesh's Sylhet region</li>
    <li>Relief camps isolated for weeks — no internet, no cellular</li>
    <li>Critical supplies must reach camps within tight SLA windows</li>
    <li>No way to predict which routes will fail next</li>
  </ul>
</div>
</body>
</html>
