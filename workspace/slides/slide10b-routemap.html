<!DOCTYPE html>
<html>
<head>
<style>
html { background: #030712; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif; display: flex; flex-direction: column;
  background-image: url('bg-dark.png'); background-size: cover;
}
.top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 4pt; }
.top-bar img { width: 100%; height: 4pt; }
.header { margin: 28pt 0 0 48pt; }
h1 { color: #f9fafb; font-size: 24pt; margin: 0 0 4pt 0; }
h2 { color: #06b6d4; font-size: 10pt; margin: 0; font-weight: normal; letter-spacing: 1pt; }
.img-area { margin: 14pt auto 0 auto; }
.img-area div { width: 440pt; height: 290pt; }
.img-area div p { margin: 0; color: #4b5563; font-size: 10pt; text-align: center; }
</style>
</head>
<body>
<div class="top-bar"><img src="bar-top-cyan.png"></div>
<div class="header">
  <h2>LIVE DEMO</h2>
  <h1>Route Map — Sylhet Network</h1>
</div>
<div class="img-area">
  <div id="map-image" class="placeholder" style="width: 440pt; height: 290pt;">
    <p>Route Map Screenshot</p>
  </div>
</div>
</body>
</html>
