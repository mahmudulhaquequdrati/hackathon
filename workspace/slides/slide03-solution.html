<!DOCTYPE html>
<html>
<head>
<style>
html { background: #030712; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif; display: flex; flex-direction: column;
  background-image: url('bg-dark.png'); background-size: cover;
}
.top-accent { position: absolute; top: 0; left: 0; width: 100%; height: 5pt; }
.top-accent img { width: 100%; height: 5pt; }
.bar { position: absolute; left: 44pt; top: 110pt; }
.bar img { width: 5pt; height: 220pt; }
.header { margin: 44pt 0 0 60pt; }
h2 { color: #22c55e; font-size: 13pt; margin: 0 0 4pt 0; font-weight: normal; letter-spacing: 2pt; }
h1 { color: #f9fafb; font-size: 34pt; margin: 0; }
.content { margin: 24pt 60pt 0 60pt; width: 420pt; }
ul { list-style: none; padding: 0; margin: 0; }
li { color: #e5e7eb; font-size: 14pt; margin: 0 0 14pt 0; line-height: 1.4; }
.screenshot { position: absolute; right: 40pt; top: 80pt; }
.screenshot div { width: 200pt; height: 200pt; }
</style>
</head>
<body>
<div class="top-accent"><img src="bar-top-cyan.png"></div>
<div class="bar"><img src="bar-green.png"></div>
<div class="header">
  <h2>SOLUTION</h2>
  <h1>Digital Delta</h1>
</div>
<div class="content">
  <ul>
    <li>100% offline logistics via BLE mesh networking</li>
    <li>ML flood predictions (98.3% accuracy)</li>
    <li>CRDT sync — all devices converge automatically</li>
    <li>Autonomous triage reroutes critical cargo</li>
    <li>Cryptographic proof-of-delivery</li>
    <li>Drone handoff for last-mile delivery</li>
  </ul>
</div>
<div class="screenshot">
  <div id="supply-img" class="placeholder" style="width: 200pt; height: 200pt;"></div>
</div>
</body>
</html>
