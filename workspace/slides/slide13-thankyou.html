<!DOCTYPE html>
<html>
<head>
<style>
html { background: #030712; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background-image: url('bg-thankyou.png'); background-size: cover;
}
.top-accent { position: absolute; top: 0; left: 0; width: 100%; height: 5pt; }
.top-accent img { width: 100%; height: 5pt; }
h1 { color: #f9fafb; font-size: 52pt; margin: 0 0 14pt 0; text-align: center; letter-spacing: 3pt; }
h2 { color: #06b6d4; font-size: 18pt; margin: 0 0 10pt 0; text-align: center; font-weight: normal; }
p { color: #9ca3af; font-size: 14pt; margin: 0; text-align: center; font-style: italic; }
p.footer { color: #6b7280; font-size: 12pt; position: absolute; bottom: 36pt; font-style: normal; }
</style>
</head>
<body>
<div class="top-accent"><img src="bar-top-cyan.png"></div>
<h1>THANK YOU</h1>
<h2>Digital Delta</h2>
<p>When infrastructure fails, coordination doesn't.</p>
<p class="footer">HackFusion 2026</p>
</body>
</html>
