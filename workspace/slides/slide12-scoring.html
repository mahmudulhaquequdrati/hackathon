<!DOCTYPE html>
<html>
<head>
<style>
html { background: #030712; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif; display: flex; flex-direction: column;
  background-image: url('bg-dark.png'); background-size: cover;
}
.top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 4pt; }
.top-bar img { width: 100%; height: 4pt; }
.header { margin: 28pt 0 0 0; text-align: center; }
h1 { color: #f9fafb; font-size: 24pt; margin: 0 0 4pt 0; }
h2 { color: #22c55e; font-size: 10pt; margin: 0; font-weight: normal; letter-spacing: 1pt; }
.score { margin: 12pt 0 0 0; text-align: center; }
.score h3 { margin: 0; color: #22c55e; font-size: 44pt; }
.score p { margin: 2pt 0 0 0; color: #9ca3af; font-size: 11pt; }
.list { margin: 16pt 80pt 0 80pt; }
ul { list-style: none; padding: 0; margin: 0; }
li { color: #d1d5db; font-size: 12pt; margin: 0 0 10pt 0; text-align: center; line-height: 1.4; }
.note { margin: 14pt 0 0 0; text-align: center; }
.note p { margin: 0; color: #9ca3af; font-size: 10pt; }
</style>
</head>
<body>
<div class="top-bar"><img src="bar-top-cyan.png"></div>
<div class="header">
  <h2>COMPLETION</h2>
  <h1>Module Completion</h1>
</div>
<div class="score">
  <h3>69 / 69</h3>
  <p>Total Points Achieved</p>
</div>
<div class="list">
  <ul>
    <li><b>M1:</b> 9/9  |  <b>M2:</b> 10/10  |  <b>M3:</b> 9/9  |  <b>M4:</b> 10/10</li>
    <li><b>M5:</b> 7/7  |  <b>M6:</b> 7/7  |  <b>M7:</b> 9/9  |  <b>M8:</b> 9/9</li>
  </ul>
</div>
<div class="note">
  <p>All 8 modules fully implemented and functional</p>
</div>
</body>
</html>
